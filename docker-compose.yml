# KabzıMall — yerel geliştirme altyapısı.
# PostGIS'li PostgreSQL (ileride delivery_zones poligonları için de hazır — v1.1 §3).
# Başlat:  docker compose up -d
# Durdur:  docker compose down        (veriyi korur)
# Sıfırla: docker compose down -v     (volume'ü siler)

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: kabzimall-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kabzimall
      POSTGRES_PASSWORD: kabzimall
      POSTGRES_DB: kabzimall
    ports:
      - "5432:5432"
    volumes:
      - kabzimall_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kabzimall -d kabzimall"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kabzimall_pgdata:
